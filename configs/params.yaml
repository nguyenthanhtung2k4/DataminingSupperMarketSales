        ]
      }
    }
  },
  "forecasting": {
    "frequency": "MS",
    "target_column": "Sales",
    "horizon": 6,
    "moving_average_window": 3,
    "enabled_models": [
      "naive",
      "moving_average",
      "holt_winters",
      "sarimax",
      "prophet"
    ],
    "holt_winters": {
      "trend": "add",
      "seasonal": "add",
      "seasonal_periods": 12
