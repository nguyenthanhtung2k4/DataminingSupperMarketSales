  "preprocessing": {
    "drop_duplicate_rows": true,
    "fill_numeric_missing_with_zero": true,
    "clip_negative_sales": false,
    "date_dayfirst": true,
    "basket_item_level": "Sub-Category",
    "resample_frequency": "W-MON"
  },
  "association": {
    "algorithm": "apriori",
    "min_support": 0.01,
    "min_confidence": 0.02,
    "min_lift": 1.0,
    "max_length": 3,
    "top_n_rules": 12
  },
  "clustering": {
    "candidate_k": [
      2,
      3,
      4,
      5,
      6
    ],
    "features": [
      "recency_days",
      "total_sales",
      "avg_order_value",
      "active_days",
      "unique_categories"
    ],
    "algorithms": [
      "kmeans",
      "agglomerative",
      "dbscan"
    ],
    "dbscan": {
      "eps_values": [
        0.6,
        0.8,
        1.0,
        1.2
      ],
      "min_samples_values": [
        5,
        8,
        12
      ]
    }
  },
  "classification": {
    "target_column": "segment",
    "features": [
      "recency_days",
      "order_count",
      "total_sales",
      "avg_order_value",
      "unique_categories",
      "unique_subcategories",
      "active_days",
      "active_months",
      "sales_per_active_month",
      "dominant_region"
    ],
    "categorical_features": [
      "dominant_region"
    ],
    "test_size": 0.25,
    "model_params": {
      "logistic_regression": {
        "C": 10.0,
        "class_weight": "balanced"
      },
      "decision_tree": {
        "max_depth": 5,
        "min_samples_leaf": 3,
        "class_weight": "balanced"
      },
      "random_forest": {
        "n_estimators": 100,
        "max_depth": null,
        "min_samples_leaf": 3,
        "class_weight": "balanced"
      }
    },
    "model_grid": {
