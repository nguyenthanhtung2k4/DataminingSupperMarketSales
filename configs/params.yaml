{
  "project": {
    "name": "DataminingSupperMarketSales",
    "seed": 42,
    "currency": "USD"
  },
  "paths": {
    "raw_data": "data/raw/train.csv",
    "processed_dir": "data/processed",
    "figures_dir": "outputs/figures",
    "tables_dir": "outputs/tables",
    "models_dir": "outputs/models",
    "reports_dir": "outputs/reports",
    "logs_dir": "outputs/logs"
  },
  "data": {
    "required_columns": [
      "Order ID",
      "Order Date",
      "Sales",
      "Category",
      "Sub-Category",
      "Product Name"
    ],
    "preferred_customer_columns": [
      "Customer ID",
      "Customer Name"
    ],
    "optional_numeric_columns": [
      "Quantity",
      "Discount",
      "Profit"
    ],
    "column_aliases": {
